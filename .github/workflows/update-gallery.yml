name: Update Gallery

on:
  schedule:
    - cron: '0 0 * * *'  # runs daily at midnight UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch gallery from Supabase and update JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https')
          const fs = require('fs')

          const url = new URL(`${process.env.SUPABASE_URL}/storage/v1/object/list/gallery`)
          const body = JSON.stringify({ prefix: '', limit: 100, offset: 0 })

          const req = https.request(
            { hostname: url.hostname, path: url.pathname, method: 'POST',
              headers: {
                'apikey': process.env.SUPABASE_KEY,
                'Authorization': `Bearer ${process.env.SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body),
              }
            },
            (res) => {
              let data = ''
              res.on('data', chunk => data += chunk)
              res.on('end', () => {
                if (res.statusCode !== 200) {
                  console.error(`Supabase error ${res.statusCode}: ${data}`)
                  process.exit(1)
                }
                const files = JSON.parse(data)
                const publicBase = `${process.env.SUPABASE_URL}/storage/v1/object/public/gallery`
                const gallery = files
                  .filter(f => f.name && !f.name.endsWith('/'))
                  .map(f => ({ name: f.name, url: `${publicBase}/${f.name}` }))
                fs.writeFileSync('frontend/public/gallery.json', JSON.stringify(gallery, null, 2))
                console.log(`Written ${gallery.length} photos to gallery.json`)
              })
            }
          )
          req.on('error', err => { console.error(err); process.exit(1) })
          req.write(body)
          req.end()
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet frontend/public/gallery.json || (
            git add frontend/public/gallery.json &&
            git commit -m "chore: update gallery.json [skip ci]" &&
            git push
          )
